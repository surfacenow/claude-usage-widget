<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floating Clock Widget</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="scene-bg" aria-hidden="true"></div>
    <main class="widget-shell">
      <section id="clock-panel" class="clock-panel drift-on" aria-label="floating clock panel">
        <header class="panel-head">
          <span class="brand">Floating Clock</span>
          <div class="panel-head-right">
            <span id="app-version" class="version"></span>
            <button
              id="toggle-performance"
              class="btn btn-lite"
              type="button"
              aria-label="toggle performance mode"
              title="Toggle performance mode"
            >
              LITE
            </button>
            <button id="exit-app" class="btn btn-exit" type="button" aria-label="exit app">
              EXIT
            </button>
          </div>
        </header>
        <div class="clock-stack">
          <p id="clock-time" class="clock-time">00:00:00</p>
          <p id="clock-date" class="clock-date">0000-00-00</p>
        </div>
        <div class="panel-actions">
          <label class="field">
            <span>Theme</span>
            <select id="theme-select" aria-label="theme selector"></select>
          </label>
          <button id="open-import" class="btn btn-primary" type="button">Import</button>
        </div>
        <p id="status-line" class="status-line" aria-live="polite"></p>
      </section>
    </main>

    <section id="import-modal" class="modal hidden" aria-hidden="true">
      <div class="modal-scrim" data-close-modal="true"></div>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="import-title">
        <header class="modal-head">
          <h1 id="import-title">Theme Import</h1>
          <button id="close-import" class="btn btn-ghost" type="button" aria-label="close dialog">
            Close
          </button>
        </header>
        <div class="modal-body">
          <section class="pane pane-checks" aria-label="validation checks">
            <h2>Spec Check</h2>
            <p id="selected-zip" class="selected-zip">zip: none</p>
            <ul id="check-list" class="check-list"></ul>
            <div class="action-row">
              <button id="pick-zip" class="btn" type="button">Select zip</button>
              <button id="run-import" class="btn btn-primary" type="button" disabled>
                Import
              </button>
            </div>
          </section>
          <section class="pane pane-ai" aria-label="ai helper">
            <h2>AI Hints</h2>
            <p class="pane-note">Suggestions are shown when validation fails.</p>
            <ul id="ai-hints" class="hint-list"></ul>
          </section>
        </div>
      </div>
    </section>

    <script src="./app.js" defer></script>
  </body>
</html>
